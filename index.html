<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 在线工具</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #13161b;
    --surface2: #1a1e26;
    --border: #252a35;
    --border2: #2e3545;
    --accent: #00e5a0;
    --accent2: #00b37d;
    --accent-glow: rgba(0,229,160,0.15);
    --text: #e8ecf0;
    --text2: #8a9ab0;
    --text3: #4a5568;
    --error: #ff4d6a;
    --error-bg: rgba(255,77,106,0.08);
    --warning: #ffb347;
    --string: #79d4b8;
    --number: #c3a6ff;
    --boolean: #ff9e64;
    --null: #8a9ab0;
    --key: #7eb8f7;
    --punct: #4a5568;
    --radius: 10px;
  }

  [data-theme="light"] {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --border2: #cbd5e1;
    --accent: #10b981;
    --accent2: #059669;
    --accent-glow: rgba(16,185,129,0.1);
    --text: #1e293b;
    --text2: #475569;
    --text3: #94a3b8;
    --error: #ef4444;
    --error-bg: rgba(239,68,68,0.05);
    --warning: #f59e0b;
    --string: #059669;
    --number: #7c3aed;
    --boolean: #ea580c;
    --null: #64748b;
    --key: #2563eb;
    --punct: #94a3b8;
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --accent: #10b981;
      --accent2: #059669;
      --accent-glow: rgba(16,185,129,0.1);
      --text: #1e293b;
      --text2: #475569;
      --text3: #94a3b8;
      --error: #ef4444;
      --error-bg: rgba(239,68,68,0.05);
      --warning: #f59e0b;
      --string: #059669;
      --number: #7c3aed;
      --boolean: #ea580c;
      --null: #64748b;
      --key: #2563eb;
      --punct: #94a3b8;
    }
  }

  [data-theme="dark"] {
    --bg: #0d0f12;
    --surface: #13161b;
    --surface2: #1a1e26;
    --border: #252a35;
    --border2: #2e3545;
    --accent: #00e5a0;
    --accent2: #00b37d;
    --accent-glow: rgba(0,229,160,0.15);
    --text: #e8ecf0;
    --text2: #8a9ab0;
    --text3: #4a5568;
    --error: #ff4d6a;
    --error-bg: rgba(255,77,106,0.08);
    --warning: #ffb347;
    --string: #79d4b8;
    --number: #c3a6ff;
    --boolean: #ff9e64;
    --null: #8a9ab0;
    --key: #7eb8f7;
    --punct: #4a5568;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* TAB BAR */
  .tab-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 6px 16px 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    min-width: 80px;
    max-width: 180px;
  }

  .tab:hover { background: var(--border); color: var(--text); }
  .tab.active {
    background: var(--bg);
    color: var(--accent);
    border-color: var(--border);
    border-bottom: 2px solid var(--bg);
    margin-bottom: -1px;
    z-index: 2;
  }

  .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tab-close {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.2s;
    opacity: 0.6;
  }
  .tab-close:hover { background: var(--error-bg); color: var(--error); opacity: 1; }
  .tab-close svg { width: 10px; height: 10px; }

  .add-tab-btn {
    padding: 6px;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: all 0.2s;
  }
  .add-tab-btn:hover { color: var(--accent); }

  /* BG decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,160,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 58px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 18px;
    color: var(--text); text-decoration: none;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #0d0f12;
    font-family: 'JetBrains Mono', monospace;
  }

  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  nav {
    display: flex; gap: 4px;
  }

  nav button {
    background: none; border: none;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 6px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active {
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.2);
  }

  .theme-switcher {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 4px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    margin-left: 12px;
  }

  .theme-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    color: var(--text3);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .theme-btn:hover { background: var(--border); color: var(--text); }
  .theme-btn.active {
    background: var(--accent);
    color: var(--bg);
  }

  /* TOOLBAR */
  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 7px;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: 1px solid transparent;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent2); box-shadow: 0 0 16px var(--accent-glow); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border-color: var(--border2);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--border2); background: var(--border); }

  .btn-danger {
    background: var(--error-bg);
    color: var(--error);
    border-color: var(--error);
  }
  .btn-danger:hover { background: var(--error); color: white; }

  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .separator { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  .indent-control {
    display: flex; align-items: center; gap: 6px;
    color: var(--text2); font-size: 12px; font-weight: 600;
    margin-left: auto;
  }

  .indent-control select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 6px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    flex-wrap: wrap;
  }

  .status-badge {
    display: flex; align-items: center; gap: 5px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .status-badge.valid { background: rgba(0,229,160,0.1); color: var(--accent); }
  .status-badge.invalid { background: rgba(255,77,106,0.1); color: var(--error); }
  .status-badge.idle { background: var(--surface2); color: var(--text3); }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* MAIN */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
    position: relative;
    z-index: 1;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .panel-header span { display: flex; align-items: center; gap: 6px; }

  .panel-actions { display: flex; gap: 4px; }

  .icon-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    padding: 4px; border-radius: 5px;
    transition: all 0.15s;
    display: flex; align-items: center;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn svg { width: 14px; height: 14px; }

  .divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .divider:hover { background: var(--accent); }
  .divider::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 2px; height: 40px;
    background: var(--border2);
    border-radius: 2px;
  }
  .divider:hover::after { background: var(--accent); }

  /* EDITOR */
  .editor-wrap {
    flex: 1; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  textarea {
    flex: 1;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.75;
    padding: 16px 20px;
    tab-size: 2;
    caret-color: var(--accent);
    letter-spacing: 0.3px;
  }

  textarea::placeholder { color: var(--text3); }
  textarea:focus { background: var(--surface); }

  textarea.error-state {
    background: linear-gradient(to bottom, var(--error-bg), var(--bg) 80px);
  }

  /* OUTPUT */
  .output-wrap {
    flex: 1;
    overflow: auto;
    background: var(--bg);
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.75;
  }

  /* JSON highlighting */
  .json-string { color: var(--string); }
  .json-number { color: var(--number); }
  .json-boolean { color: var(--boolean); }
  .json-null { color: var(--null); font-style: italic; }
  .json-key { color: var(--key); }
  .json-punct { color: var(--punct); }
  .json-brace { color: #5a6a80; }

  .tree-node { display: block; }
  .tree-toggle {
    cursor: pointer;
    user-select: none;
    color: var(--text3);
    display: inline-flex; align-items: center;
    transition: color 0.15s;
    margin-right: 2px;
  }
  .tree-toggle:hover { color: var(--accent); }
  .tree-toggle svg { width: 10px; height: 10px; }

  .tree-children { display: block; }
  .tree-children.collapsed { display: none; }

  .tree-preview {
    color: var(--text3);
    font-size: 12px;
  }

  /* ERROR MESSAGE */
  .error-msg {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--error-bg);
    border: 1px solid rgba(255,77,106,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--error);
    line-height: 1.6;
  }

  .error-icon { flex-shrink: 0; margin-top: 2px; }

  /* DIFF VIEW */
  .diff-added { background: rgba(0,229,160,0.06); color: var(--accent); }
  .diff-removed { background: rgba(255,77,106,0.06); color: var(--error); text-decoration: line-through; }

  /* SEARCH BAR */
  .search-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 8px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }

  /* COPY TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--accent);
    color: #0d0f12;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600; font-size: 13px;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* STATS CHIPS */
  .stat { color: var(--text3); }
  .stat b { color: var(--text2); }

  /* SAMPLE MENU */
  .sample-menu {
    position: absolute; top: 36px; left: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 9px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 50;
    overflow: hidden;
    min-width: 200px;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

  .sample-menu button {
    display: block; width: 100%;
    background: none; border: none;
    text-align: left;
    padding: 9px 14px;
    color: var(--text2);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .sample-menu button:hover { background: var(--border); color: var(--text); }

  .relative { position: relative; }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3e4a60; }

  /* TABS in output */
  .view-tabs {
    display: flex; gap: 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .view-tab {
    padding: 7px 16px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Syne', sans-serif;
  }

  .view-tab:hover { color: var(--text2); }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Line numbers */
  .editor-container {
    display: flex; flex: 1; overflow: hidden;
  }

  .line-numbers {
    background: var(--surface);
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.75;
    padding: 16px 10px 16px 14px;
    text-align: right;
    user-select: none;
    border-right: 1px solid var(--border);
    min-width: 48px;
    overflow: hidden;
    white-space: pre;
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .divider { width: 100%; height: 4px; cursor: row-resize; }
    .panel { min-height: 200px; }
    nav { display: none; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">{ }</div>
    JSON<span>工具</span>
  </a>
  <div class="header-right">
  <div class="theme-switcher" id="themeSwitcher">
    <button class="theme-btn active" id="themeSystem" onclick="setTheme('system')" title="跟随系统">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="10" rx="2"/><path d="M8 12a4 4 0 000-8"/></svg>
    </button>
    <button class="theme-btn" id="themeLight" onclick="setTheme('light')" title="浅色">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M13.1 2.9l-1.4 1.4M4.3 11.7l-1.4 1.4"/></svg>
    </button>
    <button class="theme-btn" id="themeDark" onclick="setTheme('dark')" title="深色">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8.5A5.5 5.5 0 114.5 4a4 4 0 008.5 4.5z"/></svg>
    </button>
  </div>
  <nav>
    <button class="active" onclick="switchTab('format')">格式化</button>
    <button onclick="switchTab('compress')">压缩</button>
    <button onclick="switchTab('validate')">校验</button>
    <button onclick="switchTab('convert')">转义</button>
    <button onclick="switchTab('xslt')">XSLT</button>
    <button onclick="switchTab('diff')">比对</button>
    <button onclick="switchTab('base64')">Base64</button>
  </nav>
  </div>
</header>

<div class="tab-bar" id="tabBar">
  <!-- Tabs will be injected here -->
  <div class="add-tab-btn" onclick="addNewTab()" title="新任务">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="formatJSON(event)" title="Ctrl/Alt + 点击：格式化原文">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
    格式化
  </button>
  <button class="btn btn-secondary" onclick="compressJSON()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l6 5-6 5"/></svg>
    压缩
  </button>
  <button class="btn btn-secondary" onclick="validateOnly()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,8 6,12 14,4"/></svg>
    校验
  </button>
  <div class="separator"></div>
  <button class="btn btn-secondary" onclick="escapeJSON()">转义</button>
  <button class="btn btn-secondary" onclick="unescapeJSON()">去转义</button>
  <div class="separator"></div>
  <div class="relative" id="sampleWrap">
    <button class="btn btn-secondary" onclick="toggleSampleMenu()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M5 5h3M5 11h4"/></svg>
      示例
    </button>
    <div class="sample-menu" id="sampleMenu" style="display:none">
      <button onclick="loadSample('simple')">简单对象</button>
      <button onclick="loadSample('array')">数组数据</button>

<script>
let currentView = 'tree';
let parsedData = null;
let outputText = '';
let currentTab = 'format';

// ──────────────────────────── TAB SYSTEM ────────────────────────────

let tabs = [];
let activeTabId = null;

function initTabs() {
  const saved = localStorage.getItem('json_tool_tabs');
  if (saved) {
    tabs = JSON.parse(saved);
    activeTabId = localStorage.getItem('json_tool_active_tab') || tabs[0].id;
  } else {
    const initialTab = {
      id: Date.now().toString(),
      title: '未命名任务 1',
      json: '',
      xsltSource: '',
      xsltTemplate: '',
      xsltMode: 'json',
      diffLeft: '',
      diffRight: '',
      base64Input: '',
      activeFunction: 'format'
    };
    tabs = [initialTab];
    activeTabId = initialTab.id;
  }
  renderTabs();
  loadTabContent(activeTabId);
}

function renderTabs() {
  const container = document.getElementById('tabBar');
  // Keep only the add button
  const addBtn = container.querySelector('.add-tab-btn');
  container.innerHTML = '';
  
  tabs.forEach(tab => {
    const tabEl = document.createElement('div');
    tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
    tabEl.onclick = () => switchTabTo(tab.id);
    tabEl.ondblclick = () => renameTab(tab.id);
    
    tabEl.innerHTML = `
      <span class="tab-title">${tab.title}</span>
      <div class="tab-close" onclick="closeTab(event, '${tab.id}')">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l8 8M9 1L1 9"/></svg>
      </div>
    `;
    container.appendChild(tabEl);
  });
  
  container.appendChild(addBtn);
}

function addNewTab() {
  const newId = Date.now().toString();
  const newTab = {
    id: newId,
    title: `未命名任务 ${tabs.length + 1}`,
    json: '',
    xsltSource: '',
    xsltTemplate: '',
    xsltMode: 'json',
    diffLeft: '',
    diffRight: '',
    base64Input: '',
    activeFunction: 'format'
  };
  tabs.push(newTab);
  saveTabs();
  switchTabTo(newId);
}

function switchTabTo(id) {
  if (activeTabId === id) return;
  
  // Save current tab content before switching
  updateCurrentTabData();
  
  activeTabId = id;
  localStorage.setItem('json_tool_active_tab', id);
  renderTabs();
  loadTabContent(id);
}

function closeTab(e, id) {
  e.stopPropagation();
  if (tabs.length === 1) return;
  
  const index = tabs.findIndex(t => t.id === id);
  tabs.splice(index, 1);
  
  if (activeTabId === id) {
    activeTabId = tabs[Math.max(0, index - 1)].id;
    localStorage.setItem('json_tool_active_tab', activeTabId);
    loadTabContent(activeTabId);
  }
  
  saveTabs();
  renderTabs();
}

function renameTab(id) {
  const tab = tabs.find(t => t.id === id);
  const newName = prompt('重命名任务:', tab.title);
  if (newName && newName.trim()) {
    tab.title = newName.trim();
    saveTabs();
    renderTabs();
  }
}

function saveTabs() {
  localStorage.setItem('json_tool_tabs', JSON.stringify(tabs));
}

function updateCurrentTabData() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    tab.json = document.getElementById('jsonInput').value;
    tab.xsltSource = document.getElementById('xsltSource').value;
    tab.xsltTemplate = document.getElementById('xsltTemplate').value;
    tab.xsltMode = xsltSourceMode;
    tab.diffLeft = document.getElementById('diffLeft').value;
    tab.diffRight = document.getElementById('diffRight').value;
    tab.base64Input = document.getElementById('base64Input').value;
    tab.activeFunction = currentTab;
    saveTabs();
  }
}

function loadTabContent(id) {
  const tab = tabs.find(t => t.id === id);
  if (tab) {
    document.getElementById('jsonInput').value = tab.json || '';
    document.getElementById('xsltSource').value = tab.xsltSource || '';
    document.getElementById('xsltTemplate').value = tab.xsltTemplate || '';
    document.getElementById('diffLeft').value = tab.diffLeft || '';
    document.getElementById('diffRight').value = tab.diffRight || '';
    document.getElementById('base64Input').value = tab.base64Input || '';
    setXsltSourceMode(tab.xsltMode || 'json');
    
    // 恢复功能切换状态
    if (tab.activeFunction) {
      switchTab(tab.activeFunction);
    }

    // 触发重新渲染和行号更新，但不清空内容
    updateLineNumbers();
    // 如果有 JSON 数据，尝试解析并渲染树形/文本视图
    if (tab.json) {
      try {
        parsedData = JSON.parse(tab.json);
        renderOutput();
      } catch(e) {
        parsedData = null;
      }
    } else {
      clearOutput();
    }
  }
}

// Auto-save on input
function onInputChange() {
  updateLineNumbers();
  updateCurrentTabData();
}

// ──────────────────────────── CORE ────────────────────────────

function getIndent() {
  const v = document.getElementById('indentSize').value;
  return v === 'tab' ? '\t' : ' '.repeat(parseInt(v));
}

function formatJSON(e) {
  const input = document.getElementById('jsonInput').value.trim();
  if (!input) { clearOutput(); return; }
  try {
    parsedData = JSON.parse(input);
    const indent = getIndent();
    outputText = JSON.stringify(parsedData, null, indent);
    setStatus('valid', '✓ JSON 合法');
    updateStats(parsedData, outputText);

    // Ctrl 或 Alt 点击：将格式化结果写回输入框，切换到纯文本视图
    if (e && (e.ctrlKey || e.altKey)) {
      document.getElementById('jsonInput').value = outputText;
      updateLineNumbers();
      switchView('raw');
      showToast('已格式化原文');
      return;
    }

    renderOutput();
  } catch (e) {
    parsedData = null;
    outputText = '';
    setStatus('invalid', '✗ ' + friendlyError(e));
    showError(e.message);
    clearStats();
  }
}

function compressJSON() {
  const input = document.getElementById('jsonInput').value.trim();
  if (!input) return;
  try {
    parsedData = JSON.parse(input);
    outputText = JSON.stringify(parsedData);
    document.getElementById('jsonInput').value = outputText;
    setStatus('valid', '✓ 已压缩');
    updateStats(parsedData, outputText);
    renderOutput();
    updateLineNumbers();
    showToast('已压缩');
  } catch(e) {
    setStatus('invalid', '✗ ' + friendlyError(e));
    showError(e.message);
  }
}

function validateOnly() {
  const input = document.getElementById('jsonInput').value.trim();
  if (!input) { setStatus('idle', '就绪'); return; }
  try {
    JSON.parse(input);
    setStatus('valid', '✓ JSON 格式正确');
    showToast('✓ 校验通过');
  } catch(e) {
    setStatus('invalid', '✗ ' + friendlyError(e));
    showError(e.message);
  }
}

function escapeJSON() {
  const input = document.getElementById('jsonInput').value;
  outputText = JSON.stringify(input);
  document.getElementById('jsonOutput').innerHTML = '<span class="json-string">' + escapeHtml(outputText) + '</span>';
  setStatus('valid', '已转义');
}

function unescapeJSON() {
  const input = document.getElementById('jsonInput').value.trim();
  try {
    const unescaped = JSON.parse(input);
    if (typeof unescaped === 'string') {
      outputText = unescaped;
    } else {
      outputText = JSON.stringify(unescaped, null, getIndent());
    }
    document.getElementById('jsonOutput').innerText = outputText;
    setStatus('valid', '已去转义');
  } catch(e) {
    setStatus('invalid', '去转义失败');
  }
}

function clearAll() {
  // 清空主 JSON 输入和输出
  document.getElementById('jsonInput').value = '';
  clearOutput();
  setStatus('idle', '就绪');
  clearStats();
  parsedData = null;
  updateLineNumbers();

  // 如果在 XSLT 模式，同时清空 XSLT 相关内容
  if (document.getElementById('xsltPanel').style.display === 'flex') {
    clearXslt();
  } else {
    updateCurrentTabData();
    showToast('已清空');
  }
}

// ──────────────────────────── RENDER ────────────────────────────

function renderOutput() {
  if (!parsedData && parsedData !== 0 && parsedData !== '' && parsedData !== false && parsedData !== null) return;
  const wrap = document.getElementById('jsonOutput');
  if (currentView === 'tree') {
    wrap.innerHTML = renderTree(parsedData, 0);
    attachToggleHandlers();
  } else {
    wrap.innerHTML = syntaxHighlight(outputText);
  }
}

function renderTree(value, depth, key, isLast) {
  const comma = isLast ? '' : '<span class="json-punct">,</span>';
  let html = '<div class="tree-node">';
  let prefix = '';
  if (key !== undefined) {
    prefix = `<span class="json-key">"${escapeHtml(String(key))}"</span><span class="json-punct">: </span>`;
  }

  if (value === null) {
    html += prefix + `<span class="json-null">null</span>${comma}`;
  } else if (typeof value === 'boolean') {
    html += prefix + `<span class="json-boolean">${value}</span>${comma}`;
  } else if (typeof value === 'number') {
    html += prefix + `<span class="json-number">${value}</span>${comma}`;
  } else if (typeof value === 'string') {
    html += prefix + `<span class="json-string">"${escapeHtml(value)}"</span>${comma}`;
  } else if (Array.isArray(value)) {
    const len = value.length;
    if (len === 0) {
      html += prefix + `<span class="json-brace">[]</span>${comma}`;
    } else {
      const id = 'node-' + Math.random().toString(36).slice(2);
      html += prefix;
      html += `<span class="tree-toggle expanded" data-target="${id}"><svg viewBox="0 0 10 10" fill="currentColor"><path d="M1 3l4 4 4-4"/></svg></span>`;
      html += `<span class="json-brace">[</span>`;
      html += `<span class="tree-preview" style="display:none"> … ${len} 项 ]</span>`;
      html += `<div class="tree-children" id="${id}" style="padding-left:20px">`;
      value.forEach((item, i) => {
        html += renderTree(item, depth + 1, i, i === len - 1);
      });
      html += `</div>`;
      html += `<span class="json-brace">]</span>${comma}`;
    }
  } else if (typeof value === 'object') {
    const keys = Object.keys(value);
    if (keys.length === 0) {
      html += prefix + `<span class="json-brace">{}</span>${comma}`;
    } else {
      const id = 'node-' + Math.random().toString(36).slice(2);
      html += prefix;
      html += `<span class="tree-toggle expanded" data-target="${id}"><svg viewBox="0 0 10 10" fill="currentColor"><path d="M1 3l4 4 4-4"/></svg></span>`;
      html += `<span class="json-brace">{</span>`;
      html += `<span class="tree-preview" style="display:none"> … ${keys.length} 个属性 }</span>`;
      html += `<div class="tree-children" id="${id}" style="padding-left:20px">`;
      keys.forEach((k, i) => {
        html += renderTree(value[k], depth + 1, k, i === keys.length - 1);
      });
      html += `</div>`;
      html += `<span class="json-brace">}</span>${comma}`;
    }
  }
  html += '</div>';
  return html;
}

function attachToggleHandlers() {
  // Use event delegation — bind once on the output container
  const wrap = document.getElementById('jsonOutput');
  wrap.onclick = function(e) {
    const toggle = e.target.closest('.tree-toggle');
    if (!toggle) return;
    const targetId = toggle.getAttribute('data-target');
    const children = document.getElementById(targetId);
    if (!children) return;
    // preview is the span right after the opening brace span (sibling after toggle + brace)
    const preview = toggle.nextElementSibling?.nextElementSibling;
    const isExpanded = toggle.classList.contains('expanded');
    if (isExpanded) {
      toggle.classList.remove('expanded');
      toggle.classList.add('collapsed');
      toggle.innerHTML = '<svg viewBox="0 0 10 10" fill="currentColor"><path d="M3 1l4 4-4 4"/></svg>';
      children.classList.add('collapsed');
      if (preview) preview.style.display = '';
    } else {
      toggle.classList.remove('collapsed');
      toggle.classList.add('expanded');
      toggle.innerHTML = '<svg viewBox="0 0 10 10" fill="currentColor"><path d="M1 3l4 4 4-4"/></svg>';
      children.classList.remove('collapsed');
      if (preview) preview.style.display = 'none';
    }
  };
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      let cls = 'json-number';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'json-key' : 'json-string';
      } else if (/true|false/.test(match)) {
        cls = 'json-boolean';
      } else if (/null/.test(match)) {
        cls = 'json-null';
      }
      return `<span class="${cls}">${match}</span>`;
    });
}

function countKeys(obj) {
  if (typeof obj !== 'object' || obj === null) return 0;
  let count = Array.isArray(obj) ? 0 : Object.keys(obj).length;
  const vals = Array.isArray(obj) ? obj : Object.values(obj);
  vals.forEach(v => { count += countKeys(v); });
  return count;
}

function getDepth(obj, d=0) {
  if (typeof obj !== 'object' || obj === null) return d;
  const vals = Array.isArray(obj) ? obj : Object.values(obj);
  return vals.reduce((max, v) => Math.max(max, getDepth(v, d+1)), d);
}

function friendlyError(e) {
  const m = e.message;
  if (m.includes('position')) {
    const pos = m.match(/position (\d+)/);
    return pos ? `第 ${pos[1]} 个字符附近有错误` : m;
  }
  return m;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function runDiff() {
  const left = document.getElementById('diffLeft').value;
  const right = document.getElementById('diffRight').value;
  const output = document.getElementById('diffOutput');
  
  if (!left && !right) {
    output.innerHTML = '<span style="color:var(--text3)">请输入内容进行比对...</span>';
    return;
  }
  
  const diff = Diff.diffLines(left, right);
  let html = '';
  
  diff.forEach((part) => {
    const color = part.added ? 'diff-added' : part.removed ? 'diff-removed' : '';
    const prefix = part.added ? '+ ' : part.removed ? '- ' : '  ';
    const text = escapeHtml(part.value).split('\n').map(line => {
      if (!line && part === diff[diff.length-1]) return '';
      return `<div class="${color}">${prefix}${line}</div>`;
    }).join('');
    html += text;
  });
  
  output.innerHTML = html || '<span style="color:var(--accent)">内容完全一致</span>';
  updateCurrentTabData();
}

// ──────────────────────────── BASE64 LOGIC ────────────────────────────

function base64Encode() {
  const input = document.getElementById('base64Input').value;
  const output = document.getElementById('base64Output');
  if (!input) return;
  
  try {
    // 方案 1: 使用 TextEncoder 处理 UTF-8 字符串
    const bytes = new TextEncoder().encode(input);
    const binString = Array.from(bytes, (byte) => String.fromCharCode(byte)).join("");
    const encoded = btoa(binString);
    output.innerText = encoded;
    window._base64Result = encoded;
    showToast('编码成功');
  } catch (e) {
    output.innerHTML = `<span style="color:var(--error)">编码失败: ${e.message}</span>`;
  }
  updateCurrentTabData();
}

function base64Decode() {
  let input = document.getElementById('base64Input').value.trim();
  const output = document.getElementById('base64Output');
  const downloadBtn = document.getElementById('downloadPdfBtn');
  if (!input) return;
  
  try {
    // 1. 去除常见的 Data URI 前缀，例如 "data:text/plain;base64,"
    if (input.includes(',')) {
      input = input.split(',')[1];
    }
    
    // 2. 去除所有空白字符（空格、换行等）
    input = input.replace(/\s/g, '');
    
    // 3. 补全可能丢失的填充字符 '='
    while (input.length % 4 !== 0) {
      input += '=';
    }

    // 4. 执行解码
    const binString = atob(input);
    const bytes = Uint8Array.from(binString, (m) => m.codePointAt(0));
    
    // 5. 探测是否是 PDF (魔数 %PDF- 是 25 50 44 46 2D)
    const isPdf = bytes[0] === 0x25 && bytes[1] === 0x50 && bytes[2] === 0x44 && bytes[3] === 0x46;
    
    if (isPdf) {
      window._decodedBlob = new Blob([bytes], {type: 'application/pdf'});
      downloadBtn.style.display = 'inline-flex';
      output.innerHTML = `<div style="color:var(--accent); margin-bottom:10px;">检测到 PDF 文件数据！</div><div style="color:var(--text2); font-size:12px;">已准备好下载。你可以点击上方的“下载 PDF”按钮保存文件。</div>`;
      showToast('检测到 PDF 数据');
    } else {
      downloadBtn.style.display = 'none';
      const decoded = new TextDecoder().decode(bytes);
      output.innerText = decoded;
      showToast('解码成功');
    }
    
    window._base64Result = isPdf ? 'PDF 文件数据' : output.innerText;
  } catch (e) {
    console.error('Base64 解码详细错误:', e);
    if (downloadBtn) downloadBtn.style.display = 'none';
    output.innerHTML = `<span style="color:var(--error)">解码失败: 请确保输入是有效的 Base64 字符串。错误详情: ${e.message}</span>`;
  }
  updateCurrentTabData();
}

function downloadPdf() {
  if (!window._decodedBlob) return;
  const url = URL.createObjectURL(window._decodedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `decoded_${Date.now()}.pdf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('正在下载 PDF');
}

// JSON 对象 → XML 字符串（递归）
function jsonToXml(obj, tagName) {
  // 数组：如果有父标签名，每个元素都用该标签名，否则用 <item>
  if (Array.isArray(obj)) {
    const childTag = tagName || 'item';
    return obj.map(item => jsonToXml(item, childTag)).join('\n');
  }
  if (obj === null) return tagName ? `<${tagName}/>` : '';
  if (typeof obj !== 'object') {
    return tagName ? `<${tagName}>${escapeXml(String(obj))}</${tagName}>` : escapeXml(String(obj));
  }
  // 对象：对每个 key 生成对应标签；如果 value 是数组，递归时把 key 作为 childTag
  const inner = Object.entries(obj)
    .map(([k, v]) => {
      const tag = sanitizeTag(k);
      if (Array.isArray(v)) {
        // 数组：每个元素以父 key 作为标签名
        return v.map(item => jsonToXml(item, tag)).join('\n');
      }
      return jsonToXml(v, tag);
    })
    .join('\n');
  return tagName
    ? `<${tagName}>\n${indent2(inner)}\n</${tagName}>`
    : inner;
}

function sanitizeTag(k) {
  // XML 标签名不能以数字或特殊字符开头
  return k.replace(/[^a-zA-Z0-9_\-\.]/g, '_').replace(/^([^a-zA-Z_])/, '_$1') || '_';
}

function escapeXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function indent2(str) {
  return str.split('\n').map(l => '  ' + l).join('\n');
}

// 检测 XSLT 版本：除了看 version 属性，还检查是否用到了 2.0/3.0 特有的函数或元素
function detectXsltVersion(xslStr) {
  // 先看 version 属性
  const m = xslStr.match(/<xsl:stylesheet[^>]*\sversion\s*=\s*["']([^"']+)["']/);
  const declaredVersion = m ? parseFloat(m[1]) : 1.0;

  // 检测 XSLT 2.0/3.0 特有的函数和元素
  // 注意用单词边界避免误匹配（例如 translate 在 1.0 和 2.0 都有）
  const v2Features = [
    /\breplace\s*\(/,           // 2.0 正则替换
    /\bmatches\s*\(/,           // 2.0 正则匹配
    /\btokenize\s*\(/,          // 2.0 正则分割
    /\bupper-case\s*\(/,        // 2.0 大写
    /\blower-case\s*\(/,        // 2.0 小写
    /\bstring-join\s*\(/,       // 2.0
    /\bdistinct-values\s*\(/,   // 2.0
    /\bcurrent-date\s*\(/,      // 2.0
    /\bcurrent-dateTime\s*\(/,  // 2.0
    /\bformat-date\s*\(/,       // 2.0
    /\bformat-dateTime\s*\(/,   // 2.0
    /\bformat-number\s*\(/,     // 2.0（1.0 也有但语法不同，保险起见归为 2.0）
    /\bindex-of\s*\(/,          // 2.0
    /\bends-with\s*\(/,         // 2.0
    /<xsl:for-each-group\b/,    // 2.0
    /<xsl:function\b/,          // 2.0
    /<xsl:sequence\b/,          // 2.0
    /<xsl:analyze-string\b/,    // 2.0
    /<xsl:result-document\b/,   // 2.0
    /<xsl:iterate\b/,           // 3.0
    /<xsl:merge\b/,             // 3.0
    /<xsl:try\b/,               // 3.0
    /\bxsl:mode\b/,             // 3.0
  ];

  for (const pattern of v2Features) {
    if (pattern.test(xslStr)) {
      return Math.max(declaredVersion, 2.0);
    }
  }

  return declaredVersion;
}

// 准备源 XML 字符串
function prepareSourceXml(sourceRaw, xsltVersion) {
  if (xsltSourceMode === 'json') {
    // 如果是 XSLT 3.0，通常期望直接解析原始 JSON
    // 我们提供一个 <JSON> 标签包裹原始字符串，方便使用 parse-json(JSON)
    if (xsltVersion >= 3.0) {
      return `<?xml version="1.0" encoding="UTF-8"?>\n<JSON>${escapeXml(sourceRaw)}</JSON>`;
    }

    let jsonObj;
    try { jsonObj = JSON.parse(sourceRaw); }
    catch(e) { throw new Error('JSON 解析失败：' + e.message); }

    // XSLT 1.0/2.0 模式：继续提供结构化 XML
    if (jsonObj && typeof jsonObj === 'object' && !Array.isArray(jsonObj)) {
      const keys = Object.keys(jsonObj);
      if (keys.length === 1) {
        return `<?xml version="1.0" encoding="UTF-8"?>\n` + jsonToXml(jsonObj[keys[0]], sanitizeTag(keys[0]));
      }
    }
    const inner = jsonToXml(jsonObj, null);
    return `<?xml version="1.0" encoding="UTF-8"?>\n<root>\n${indent2(inner)}\n</root>`;
  }
  return sourceRaw;
}

async function runXslt() {
  const sourceRaw = document.getElementById('xsltSource').value.trim();
  const xsltRaw   = document.getElementById('xsltTemplate').value.trim();
  const outputEl  = document.getElementById('xsltOutput');

  if (!sourceRaw) { setXsltStatus('error', '请输入源数据'); return; }
  if (!xsltRaw)   { setXsltStatus('error', '请输入 XSLT 模板'); return; }

  const version = detectXsltVersion(xsltRaw);

  // 准备源 XML
  let sourceXmlStr;
  try { sourceXmlStr = prepareSourceXml(sourceRaw, version); }
  catch(e) { setXsltStatus('error', e.message); return; }

  if (version >= 2.0) {
    // ── XSLT 2.0 / 3.0：调用后端编译 ──
    await runXsltAdvanced(sourceXmlStr, xsltRaw, outputEl);
  } else {
    // ── XSLT 1.0：浏览器原生处理 ──
    runXsltNative(sourceXmlStr, xsltRaw, outputEl);
  }
}

// 浏览器原生 XSLT 1.0
function runXsltNative(sourceXmlStr, xsltRaw, outputEl) {
  try {
    const parser = new DOMParser();
    const sourceDoc = parser.parseFromString(sourceXmlStr, 'text/xml');
    const srcErr = sourceDoc.querySelector('parsererror');
    if (srcErr) { setXsltStatus('error', '源 XML 解析错误：' + srcErr.textContent.slice(0,120)); return; }

    const xsltDoc = parser.parseFromString(xsltRaw, 'text/xml');
    const xslErr = xsltDoc.querySelector('parsererror');
    if (xslErr) { setXsltStatus('error', 'XSLT 解析错误：' + xslErr.textContent.slice(0,120)); return; }

    const processor = new XSLTProcessor();
    processor.importStylesheet(xsltDoc);

    const serializer = new XMLSerializer();
    let result = '';

    // 策略1：先尝试 transformToDocument
    try {
      const resultDoc = processor.transformToDocument(sourceDoc);
      if (resultDoc && resultDoc.documentElement) {
        result = serializer.serializeToString(resultDoc.documentElement);
      }
    } catch(_) { /* ignore, try fragment */ }

    // 策略2：如果 Document 失败或为空，尝试 transformToFragment
    if (!result.trim()) {
      const ownerDoc = document.implementation.createDocument('', '', null);
      const fragment = processor.transformToFragment(sourceDoc, ownerDoc);
      if (fragment) {
        for (const node of fragment.childNodes) {
          if (node.nodeType === 3) result += node.nodeValue;
          else result += serializer.serializeToString(node);
        }
      }
    }

    if (!result.trim()) {
      setXsltStatus('error', '转换结果为空');
      outputEl.innerHTML = `<div class="error-msg"><div>转换结果为空。请检查：<br>1. XSLT 的 match 表达式是否匹配源 XML 的节点路径<br>2. JSON 模式下源数据会被包裹在 &lt;root&gt; 标签中（除非顶层只有一个 key）</div></div>`;
      return;
    }

    result = formatXmlString(result);

    outputEl.innerHTML = '<span style="color:var(--string)">' + escapeHtml(result) + '</span>';
    setXsltStatus('ok', '✓ 转换成功（XSLT 1.0）');
    window._xsltOutputText = result;
  } catch(e) {
    setXsltStatus('error', '执行错误：' + e.message);
    outputEl.innerHTML = `<div class="error-msg"><div>${escapeHtml(e.message)}</div></div>`;
  }
}

// 后端编译 XSLT 2.0/3.0
async function runXsltAdvanced(sourceXmlStr, xsltRaw, outputEl) {
  setXsltStatus('loading', '⏳ 编译中，请稍候...');
  outputEl.innerHTML = '<span style="color:var(--text3)">正在调用编译服务...</span>';

  try {
    const res = await fetch('/api/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ xsl: xsltRaw, source: sourceXmlStr })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      setXsltStatus('error', '✗ ' + (data.error || '后端错误'));
      outputEl.innerHTML = `<div class="error-msg"><div>${escapeHtml(data.error || '未知错误')}</div></div>`;
      return;
    }

    const result = formatXmlString(data.result);
    outputEl.innerHTML = '<span style="color:var(--string)">' + escapeHtml(result) + '</span>';

    // 显示耗时和缓存状态
    let statusMsg = '✓ 转换成功（XSLT 2.0/3.0）';
    if (data._meta) {
      const { cached, totalMs } = data._meta;
      statusMsg += cached
        ? ` · ${totalMs}ms（缓存命中 ⚡）`
        : ` · ${totalMs}ms`;
    }
    setXsltStatus('ok', statusMsg);
    window._xsltOutputText = result;

  } catch(e) {
    // 网络失败时提示（本地调试时后端不可用）
    setXsltStatus('error', '✗ 无法连接编译服务，请确认已部署到 Vercel');
    outputEl.innerHTML = `<div class="error-msg"><div>无法连接到后端编译服务。<br>本地打开 HTML 文件时此功能不可用，请部署到 Vercel 后使用。</div></div>`;
  }
}

// 简单 XML 格式化（缩进）
function formatXmlString(xml) {
  let formatted = '';
  let indent = 0;
  const lines = xml.replace(/>\s*</g, '>\n<').split('\n');
  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    if (/^<\//.test(line)) indent--;
    formatted += '  '.repeat(Math.max(0, indent)) + line + '\n';
    if (/^<[^?!\/][^>]*[^\/]>/.test(line) && !/<.*>.*<\/.*>/.test(line)) indent++;
  });
  return formatted.trim();
}

function setXsltStatus(type, msg) {
  const el = document.getElementById('xsltStatus');
  if (type === 'ok') el.style.color = 'var(--accent)';
  else if (type === 'error') el.style.color = 'var(--error)';
  else el.style.color = 'var(--text2)';
  el.textContent = msg;
}

// 通用复制函数，兼容非 HTTPS 环境
function copyToClipboard(text, successMsg = '已复制') {
  if (!text) return false;
  
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast(successMsg));
    return true;
  } else {
    // Fallback: 使用 textarea 模拟复制
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      const successful = document.execCommand('copy');
      if (successful) showToast(successMsg);
    } catch (err) {
      console.error('无法复制', err);
    }
    document.body.removeChild(textArea);
    return true;
  }
}

function xsltCopySource() {
  const v = document.getElementById('xsltSource').value;
  copyToClipboard(v, '已复制数据源');
}

function xsltClearSource() {
  document.getElementById('xsltSource').value = '';
  updateCurrentTabData();
  showToast('已清空数据源');
}

function xsltCopyTemplate() {
  const v = document.getElementById('xsltTemplate').value;
  if (!v) {
    showToast('暂无模板内容');
    return;
  }
  copyToClipboard(v, '已复制模板');
}

function xsltClearTemplate() {
  document.getElementById('xsltTemplate').value = '';
  updateCurrentTabData();
  showToast('已清空模板');
}

function xsltCopyOutput() {
  const text = window._xsltOutputText;
  if (!text) {
    showToast('暂无结果');
    return;
  }
  copyToClipboard(text, '已复制结果');
}

function clearXslt() {
  // 清空当前标签页的所有 XSLT 相关数据
  document.getElementById('xsltSource').value = '';
  document.getElementById('xsltTemplate').value = '';
  document.getElementById('xsltOutput').innerHTML = '转换结果将显示在这里...';
  document.getElementById('xsltOutput').style.color = 'var(--text3)';
  document.getElementById('xsltStatus').textContent = '';
  window._xsltOutputText = '';
  updateCurrentTabData();
  showToast('已清空所有 XSLT 数据');
}
